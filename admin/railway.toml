[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "web"

[services.variables]
NODE_ENV = "production"
PORT = "3001"

[[services.ports]]
port = 3001
handler = "http"

[[services.ports.http]]
path = "/"

[[services.health_checks]]
path = "/health"
interval = "15s"
timeout = "10s"
retries = 5
