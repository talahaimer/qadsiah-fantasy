[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "web"

[services.variables]
NODE_ENV = "production"
PORT = "3001"

[[services.ports]]
port = 3001
handler = "http"

[[services.ports.http]]
path = "/"
